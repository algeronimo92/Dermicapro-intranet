name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -e

            # Actualizar código primero
            cd /docker/dermicapro-intranet
            git pull origin main

            # Traefik
            docker compose -p traefik -f /docker/dermicapro-intranet/traefik/docker-compose.yml pull || true
            docker compose -p traefik -f /docker/dermicapro-intranet/traefik/docker-compose.yml up -d

            # DermicaPro
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
