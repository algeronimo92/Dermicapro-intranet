name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Traefik primero
            docker compose -p traefik -f /root/Dermicapro-intranet/traefik/docker-compose.yml pull || true                                                                                                                                                                   
            docker compose -p traefik -f /root/Dermicapro-intranet/traefik/docker-compose.yml up -d                                                                                                                                                                          

            # DermicaPro
            cd /root/Dermicapro-intranet
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
