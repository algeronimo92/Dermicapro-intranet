# ================================
# Green Stack — Producción
# ================================
# Deploy: docker compose -p dermicapro-green -f docker-compose.prod-green.yml up -d
# El tráfico se controla via traefik/dynamic/production.yml (file provider)

services:
  backend-green:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: dermicapro-backend-green
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://dermicapro.app}
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dermicapro-prod-network
    logging:
      driver: splunk
      options:
        splunk-token: "${SPLUNK_TOKEN}"
        splunk-url: "${SPLUNK_URL}"
        splunk-insecureskipverify: "true"
        splunk-format: "json"
        splunk-sourcetype: "docker:backend-green"
        tag: "{{.Name}}"

  frontend-green:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: dermicapro-frontend-green
    restart: always
    depends_on:
      backend-green:
        condition: service_healthy
    environment:
      BACKEND_URL: http://dermicapro-backend-green:5000
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dermicapro-prod-network
      - traefik-network
    logging:
      driver: splunk
      options:
        splunk-token: "${SPLUNK_TOKEN}"
        splunk-url: "${SPLUNK_URL}"
        splunk-insecureskipverify: "true"
        splunk-format: "json"
        splunk-sourcetype: "docker:frontend-green"
        tag: "{{.Name}}"

networks:
  dermicapro-prod-network:
    external: true
    name: dermicapro-prod-network
  traefik-network:
    external: true
    name: traefik-network

volumes:
  backend_uploads:
    name: dermicapro_backend_uploads
